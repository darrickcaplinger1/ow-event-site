<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>守望先锋大锤杯</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-left">
      <img src="Hammer Cup 2025 allmode.png" alt="Hammer Cup Logo" class="nav-logo" />
      <div class="brand-text">
        <span class="brand-main">守望先锋大锤杯</span>
        <span class="brand-sub">Overwatch Hammer Cup Series</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a href="index.html" class="active">首页</a>
      <a href="events.html">赛事</a>
      <a href="schedule.html">赛程</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>HAMMER<br /><span>CUP</span></h1>
      <p class="hero-subtitle">守望先锋社区赛事平台</p>
      <p class="hero-desc">为热爱竞技的玩家打造一个公平、稳定、具有观赏性的社区赛事舞台。</p>

      <div class="hero-actions">
        <a href="events.html" class="btn btn-primary">报名赛事</a>
        <a href="schedule.html" class="btn btn-secondary">查看赛程</a>
      </div>
    </div>

    <div class="hero-logo-wrap">
      <img src="Hammer Cup 2025 allmode.png" alt="Hammer Cup Logo" class="hero-logo" />
    </div>
  </section>

  <section class="info-strip platform-cards" data-home-stats></section>

  <main class="main-layout">
    <section class="tournament-section">
      <div class="section-heading">
        <h2>赛事列表</h2>
        <a href="events.html">更多</a>
      </div>
      <div class="tournament-grid" data-home-events></div>
    </section>

    <aside class="schedule-panel">
      <div class="panel-heading">
        <h2>近期赛程</h2>
        <a href="schedule.html">更多</a>
      </div>
      <div data-home-matches></div>

      <div class="notice-box">
        <h3>赛事公告</h3>
        <p>报名开启、规则更新与赛程调整将在本页面同步发布。</p>
      </div>
    </aside>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <img src="Hammer Cup 2025 allmode.png" alt="Hammer Cup Logo" />
      <div>
        <strong>HAMMER CUP</strong>
        <p>守望先锋社区赛事平台</p>
      </div>
    </div>

    <div class="footer-social">
      <h4>关注我们</h4>
      <a href="https://space.bilibili.com/3546747374668505" target="_blank" rel="noopener noreferrer">Bilibili</a>
    </div>

    <div class="footer-bottom">
      <p>© 2026 Hammer Cup. All rights reserved.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
