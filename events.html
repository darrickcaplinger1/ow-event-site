<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛事中心 | HAMMER CUP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-left">
      <img src="Hammer Cup 2025 allmode.png" alt="Hammer Cup Logo" class="nav-logo" />
      <div class="brand-text">
        <span class="brand-main">守望先锋大锤杯</span>
        <span class="brand-sub">Overwatch Hammer Cup Series</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a href="index.html">首页</a>
      <a href="events.html" class="active">赛事</a>
      <a href="schedule.html">赛程</a>
    </nav>
  </header>

  <section class="page-hero">
    <h1>Events</h1>
    <p>查看守望先锋大锤杯平台已登记的所有赛事，包括公开赛、城市对抗赛、娱乐赛与邀请赛。</p>
  </section>

  <main class="page-container">
    <div class="section-heading">
      <h2>赛事中心</h2>
    </div>

    <div class="event-filter-bar" data-events-filters>
      <button class="filter-pill active" type="button" data-filter="all">全部</button>
      <button class="filter-pill" type="button" data-filter="open">报名开放中</button>
      <button class="filter-pill" type="button" data-filter="preparing">筹备中</button>
      <button class="filter-pill" type="button" data-filter="finished">已结束</button>
    </div>

    <div class="platform-event-grid" data-events-list></div>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <img src="Hammer Cup 2025 allmode.png" alt="Hammer Cup Logo" />
      <div>
        <strong>HAMMER CUP</strong>
        <p>守望先锋社区赛事平台</p>
      </div>
    </div>

    <div class="footer-social">
      <h4>关注我们</h4>
      <a href="//space.bilibili.com/3546747374668505" target="_blank" rel="noopener noreferrer">Bilibili</a>
    </div>

    <div class="footer-bottom">
      <p>© 2026 Hammer Cup. All rights reserved.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
